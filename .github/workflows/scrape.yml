name: Scheduled Price Scrape

on:
  schedule:
    - cron: '0 18 * * *' # Every day at 3:00 AM JST (18:00 UTC)
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: git config
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      # Batch 1: cards 0-130
      - name: Scrape batch 1 (0-130)
        run: npx ts-node --transpile-only src/index.ts --start=0 --end=130

      - name: Commit batch 1
        run: |
          git pull --rebase
          git add src/data/card.json
          git commit -m "Scrape batch 1/4 [skip ci]" || echo "No changes"
          git push

      # Batch 2: cards 130-261
      - name: Scrape batch 2 (130-261)
        run: npx ts-node --transpile-only src/index.ts --start=130 --end=261

      - name: Commit batch 2
        run: |
          git pull --rebase
          git add src/data/card.json
          git commit -m "Scrape batch 2/4 [skip ci]" || echo "No changes"
          git push

      # Batch 3: cards 261-392
      - name: Scrape batch 3 (261-392)
        run: npx ts-node --transpile-only src/index.ts --start=261 --end=392

      - name: Commit batch 3
        run: |
          git pull --rebase
          git add src/data/card.json
          git commit -m "Scrape batch 3/4 [skip ci]" || echo "No changes"
          git push

      # Batch 4: cards 392-524
      - name: Scrape batch 4 (392-524)
        run: npx ts-node --transpile-only src/index.ts --start=392 --end=524

      - name: Commit batch 4
        run: |
          git pull --rebase
          git add src/data/card.json
          git commit -m "Scrape batch 4/4 [skip ci]" || echo "No changes"
          git push

      # Generate summary after all batches
      - name: Generate summary and history
        run: npx ts-node --transpile-only src/generate-summary.ts

      - name: Commit summary
        run: |
          git pull --rebase
          git add src/data/summary.json src/data/history/
          git commit -m "Update summary and 7-day history [skip ci]" || echo "No changes"
          git push
