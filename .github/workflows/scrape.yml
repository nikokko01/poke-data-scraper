name: Scheduled Price Scrape

on:
  schedule:
    - cron: '0 18 * * *' # Every day at 3:00 AM JST (18:00 UTC)
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run scraper
        run: npx ts-node --transpile-only src/index.ts

      - name: Generate summary data
        run: npx ts-node --transpile-only src/generate-summary.ts

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add src/data/card.json src/data/summary.json
          git commit -m "Update scraped prices and summary [skip ci]" || echo "No changes to commit"
          git push
